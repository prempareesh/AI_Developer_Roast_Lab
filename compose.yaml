version: "3.9"

services:

  frontend:
    build: ./frontend
    container_name: githubroast-frontend
    env_file:
      - ./frontend/.env
    restart: always

  backend:
    build: ./backend
    container_name: githubroast-backend
    env_file:
      - ./backend/.env
    restart: always

  nginx:
    image: nginx:latest
    container_name: githubroast-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - backend