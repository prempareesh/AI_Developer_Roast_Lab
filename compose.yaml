services:

  frontend:
    build: 
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=http://localhost/api
    container_name: githubroast-frontend
    env_file:
      - ./frontend/.env
    restart: always
    platform: linux/amd64

  backend:
    build: 
      context: ./backend
    container_name: githubroast-backend
    env_file:
      - ./backend/.env
    restart: always
    platform: linux/amd64

  nginx:
    image: nginx:latest
    container_name: githubroast-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: always